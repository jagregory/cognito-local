name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: yarn
      - run: yarn install
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    name: Test
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: yarn
      - run: yarn install
      - run: yarn test

  smoke_test:
    runs-on: ubuntu-latest
    name: Smoke Test
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: yarn
      - run: yarn install
      - run: scripts/smoke-test

  build:
    runs-on: ubuntu-latest
    name: Build
    needs:
      - lint
      - test

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: yarn
      - run: yarn install
      - run: yarn build
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: lib

  publish:
    runs-on: ubuntu-latest
    name: Publish
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: yarn
      - run: yarn install
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: lib
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::037490753808:role/github-actions-ecr-push-cognito-local
          aws-region: us-east-1
      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
      - run: yarn semantic-release
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          NPM_TOKEN: ${{secrets.NPM_TOKEN}}
